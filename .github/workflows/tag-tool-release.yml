name: Tag Tool Release

on:
  push:
    branches:
      - main
    paths:
      - "tools/*/manifest.json"

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need parent commit to diff against

      - name: Create tags for manifests with updated versions
        run: |
          git diff --name-only HEAD^ HEAD -- 'tools/*/manifest.json' | while read manifest; do
            tool=$(echo "$manifest" | cut -d/ -f2)
            version=$(jq -r '.version' "$manifest")

            # Normalise: add v prefix if the manifest omits it
            [[ "$version" == v* ]] || version="v${version}"

            tag="${tool}/${version}"

            # Idempotent: skip if this tag already exists on the remote
            if git ls-remote --tags origin "refs/tags/${tag}" | grep -q .; then
              echo "Tag ${tag} already exists — skipping"
              continue
            fi

            echo "Tagging ${tag}"
            git tag "${tag}"
            git push origin "${tag}"
          done
