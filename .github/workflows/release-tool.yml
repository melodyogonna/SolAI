name: Release Tool

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Release each updated tool
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          git diff --name-only HEAD^ HEAD -- 'tools/*/manifest.json' | while read -r manifest; do
            [ -z "$manifest" ] && continue

            tool=$(echo "$manifest" | cut -d/ -f2)
            version=$(jq -r '.version' "$manifest")
            [[ "$version" == v* ]] || version="v${version}"
            tag="${tool}/${version}"

            echo "--- Processing $tag ---"

            # Idempotent: skip if this release already exists
            if git ls-remote --tags origin "refs/tags/${tag}" | grep -q .; then
              echo "Tag ${tag} already exists — skipping"
              continue
            fi

            # Build binaries
            (
              cd "tools/${tool}"
              CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o "${tool}-linux-amd64" .
              CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o "${tool}-linux-arm64" .
              sha256sum "${tool}-linux-amd64" "${tool}-linux-arm64" > checksums.txt
            )

            # Create tag and GitHub release
            git tag "${tag}"
            git push origin "${tag}"

            gh release create "${tag}" \
              "tools/${tool}/${tool}-linux-amd64" \
              "tools/${tool}/${tool}-linux-arm64" \
              "tools/${tool}/manifest.json" \
              "tools/${tool}/checksums.txt" \
              --title "${tool} ${version}" \
              --notes "Release ${version} of ${tool}"

            # Update registry index
            encoded_tag="${tag//\//%2F}"
            base_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${encoded_tag}"

            python3 - <<PYEOF
          import json

          index_path = 'registry/index.json'
          tool    = '${tool}'
          version = '${version}'
          base_url = '${base_url}'

          with open(index_path) as f:
              index = json.load(f)

          if tool not in index['tools']:
              raise SystemExit(f"Tool '{tool}' not in registry/index.json — add an entry before releasing")

          entry = index['tools'][tool]
          entry['latest'] = version
          entry.setdefault('versions', {})[version] = {
              'manifest':  f'{base_url}/manifest.json',
              'checksums': f'{base_url}/checksums.txt',
              'assets': {
                  'linux/amd64': f'{base_url}/{tool}-linux-amd64',
                  'linux/arm64': f'{base_url}/{tool}-linux-arm64',
              },
          }

          with open(index_path, 'w') as f:
              json.dump(index, f, indent=2)
              f.write('\n')

          print(f"Updated index: {tool} -> {version}")
          PYEOF

          done

      - name: Commit updated registry index
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry/index.json
          git diff --cached --quiet || git commit -m "registry: update tool versions [skip ci]"
          git push origin HEAD:main
