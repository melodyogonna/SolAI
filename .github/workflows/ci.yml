name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: solai-agent/go.mod
          cache-dependency-path: solai-agent/go.sum

      - name: Test
        run: make test
